<style>
  article .leaflet-container img,
  .leaflet-container img {
    max-width: none !important;
    width: auto !important;
    border-radius: 0 !important;
    display: block !important;
  }
  article .leaflet-marker-icon,
  article .leaflet-marker-shadow,
  .leaflet-marker-icon,
  .leaflet-marker-shadow { max-width: none !important; }
  article .leaflet-tile,
  .leaflet-tile { margin: 0 !important; max-width: none !important; }

  .track-stats-bar {
    background: #f0f0f0;
    border-radius: 0 0 12px 12px;
    padding: 10px 16px;
    margin: 0 0 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    row-gap: 6px;
    align-items: center;
    font-family: sans-serif;
    font-size: 14px;
    color: #444;
    min-height: 42px;
    box-sizing: border-box;
  }
  .track-stat          { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
  .track-stat-sep      { color: #ccc; font-size: 8px; flex-shrink: 0; }
  .track-stats-name    { font-weight: 600; color: #333; }
  .track-stats-desc    { color: #666; font-size: 13px; }
  .track-stats-loading { color: #999; font-style: italic; font-size: 13px; }
  .track-stats-error   { color: #c00; font-size: 13px; }

  .track-elevation {
    background: #f0f0f0;
    border-radius: 0 0 12px 12px;
    padding: 10px 16px 12px;
    margin: 0 0 30px;
    box-sizing: border-box;
  }
  .track-elevation svg {
    display: block;
    width: 100%;
    overflow: visible;
  }
  /* When stats bar is also present, stats bar loses its bottom radius
     and elevation chart provides it instead */
  .track-stats-bar + .track-elevation {
    margin-top: 1px;
  }
  .track-stats-bar.track-has-elevation {
    border-radius: 0;
    margin-bottom: 0;
  }

  .track-legend {
    background: #f0f0f0;
    border-radius: 0 0 12px 12px;
    padding: 10px 16px;
    margin: 0 0 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    row-gap: 8px;
    align-items: center;
    font-family: sans-serif;
    font-size: 14px;
    color: #444;
    box-sizing: border-box;
  }
  .track-legend-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .track-legend-swatch {
    display: inline-block;
    width: 20px;
    height: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .track-legend-sep { color: #ccc; font-size: 8px; flex-shrink: 0; }

  /* ── Visually hidden (RSS caption, a11y) ── */
  .track-visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* Popup note text */
  .track-popup-note { color: #444; }

  /* ── Dark mode ── */
  @media (prefers-color-scheme: dark) {
    .track-stats-bar,
    .track-elevation,
    .track-legend {
      background: #1e1e1e;
      color: #ccc;
    }
    .track-stats-name    { color: #e0e0e0; }
    .track-stats-desc    { color: #999; }
    .track-stats-loading { color: #666; }
    .track-stat-sep,
    .track-legend-sep    { color: #444; }

    /* Legend links */
    .track-legend a { color: #7eb8f7 !important; }

    /* Leaflet map background */
    .leaflet-container { background: #1a1a2e !important; }

    /* Leaflet popup card */
    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #2a2a2a;
      color: #ddd;
      box-shadow: 0 3px 14px rgba(0,0,0,0.6);
    }
    .leaflet-popup-content a { color: #7eb8f7; }
    .leaflet-popup-close-button { color: #888 !important; }
    .leaflet-popup-close-button:hover { color: #ccc !important; }

    /* Zoom controls */
    .leaflet-control-zoom a {
      background: #2a2a2a !important;
      color: #ccc !important;
      border-color: #444 !important;
    }
    .leaflet-control-zoom a:hover { background: #3a3a3a !important; }

    /* Attribution bar */
    .leaflet-control-attribution {
      background: rgba(42,42,42,0.8) !important;
      color: #888 !important;
    }
    .leaflet-control-attribution a { color: #7eb8f7 !important; }

    /* Noscript fallback */
    [id^="track-"] > noscript div {
      background: #2a2a2a !important;
      color: #999 !important;
    }

    /* Desaturate tiles slightly so track lines stay vivid */
    .leaflet-tile { filter: brightness(0.85) saturate(0.8); }

    /* Popup note text */
    .track-popup-note { color: #bbb; }
  }
</style>

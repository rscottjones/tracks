/* ── Numbered Circles: icon-0..9 (large), icon-00..09 (small), icon-10..99 ── */
(function() {
  var S = window.__mapShapes;
  function addNum(key, label, fs) {
    S[key] = {
      w: 26, h: 26, anchor: [13,13], popup: [0,-18], shadow: false,
      svg: (function(n, f) {
        return function(c) {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24">'
            + '<circle cx="12" cy="12" r="12" fill="' + c + '"/>'
            + '<text x="12" y="12" text-anchor="middle" dominant-baseline="central" '
            + 'font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="' + f + '" fill="#fff">'
            + n + '</text></svg>';
        };
      })(label, fs)
    };
  }
  for (var i = 0; i <= 9; i++)  { addNum('icon-' + i, String(i), '16'); }
  for (var j = 0; j <= 9; j++)  { addNum('icon-0' + j, '0' + j, '13'); }
  for (var k = 10; k <= 99; k++) { addNum('icon-' + k, String(k), '13'); }
})();

/* ── Shared createIcon — used by all three plugins ── */
window.__createIcon = window.__createIcon || function(iconName, color) {
  var S = window.__mapShapes || {};
  var name = String(iconName || 'circle');
  var col = color || '#3b82f6';

  var def = S[name];
  if (def && typeof def.svg === 'function') {
    var opts = {
      iconUrl: 'data:image/svg+xml;base64,' + btoa(def.svg(col)),
      iconSize: [def.w, def.h],
      iconAnchor: def.anchor,
      popupAnchor: def.popup || [0,-18]
    };
    if (def.shadow) {
      opts.shadowUrl = 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png';
      opts.shadowSize = def.shadowSize || [41,41];
      opts.shadowAnchor = def.shadowAnchor || [12,41];
    }
    return L.icon(opts);
  }

  /* Font Awesome fallback */
  if (name.indexOf('fa-') === 0) {
    if (!window.__faLoaded) {
      window.__faLoaded = true;
      var css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css';
      document.head.appendChild(css);
    }
    return L.divIcon({
      html: '<i class="fa-solid ' + name + '" style="font-size:20px;color:' + col + ';"></i>',
      className: '', iconSize: [28,28], iconAnchor: [14,14], popupAnchor: [0,-18]
    });
  }

  /* Emoji / unicode fallback */
  return L.divIcon({
    html: '<span style="font-size:22px;line-height:1;">' + iconName + '</span>',
    className: '', iconSize: [26,26], iconAnchor: [13,13], popupAnchor: [0,-18]
  });
};

/*
 * Ramer-Douglas-Peucker simplification on lat/lng arrays.
 * Points is an array of L.LatLng objects; tolerance is in degrees.
 * Returns a reduced array preserving the shape of the track.
 */
window.__rdpSimplify = function rdp(points, tolerance) {
  if (points.length <= 2) return points;
  var tSq = tolerance * tolerance;

  function ptSegDistSq(p, a, b) {
    var dx = b.lng - a.lng, dy = b.lat - a.lat;
    if (dx === 0 && dy === 0) {
      dx = p.lng - a.lng; dy = p.lat - a.lat;
      return dx * dx + dy * dy;
    }
    var t = ((p.lng - a.lng) * dx + (p.lat - a.lat) * dy) / (dx * dx + dy * dy);
    if (t < 0)      { dx = p.lng - a.lng; dy = p.lat - a.lat; }
    else if (t > 1) { dx = p.lng - b.lng; dy = p.lat - b.lat; }
    else            { dx = p.lng - (a.lng + t * dx); dy = p.lat - (a.lat + t * dy); }
    return dx * dx + dy * dy;
  }

  function simplifyRange(pts, s, e, sqTol, kept) {
    var maxSq = 0, idx = s;
    for (var i = s + 1; i < e; i++) {
      var sq = ptSegDistSq(pts[i], pts[s], pts[e]);
      if (sq > maxSq) { maxSq = sq; idx = i; }
    }
    if (maxSq > sqTol) {
      simplifyRange(pts, s,   idx, sqTol, kept);
      kept.push(pts[idx]);
      simplifyRange(pts, idx, e,   sqTol, kept);
    }
  }

  var kept = [points[0]];
  simplifyRange(points, 0, points.length - 1, tSq, kept);
  kept.push(points[points.length - 1]);
  return kept;
};
